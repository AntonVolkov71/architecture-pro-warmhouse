asyncapi: '2.6.0'
info:
  title: Warm House API
  version: '1.0.0'
  description: Асинхронные события телеметрии

servers:
  production:
    url: amqp://localhost:5672
    protocol: amqp

channels:
  telemetry.{sensor_id}.emit:
    description: Канал телеметрии для конкретного устройства
    parameters:
      sensor_id:
        description: Идентификатор устройства
        schema:
          type: integer
    publish:
      summary: Отправка данных телеметрии устройства
      message:
        contentType: application/json
        payload:
          $ref: '#/components/schemas/Telemetry'

components:
  schemas:
    Telemetry:
      type: object
      properties:
        sensor_id:
          type: integer
          description: Идентификатор устройства
        air_temperature:
          type: number
          description: Температура воздуха
        humidity:
          type: number
          description: Влажность
        status_connection:
          type: boolean
          description: Статус подключения
      required:
        - sensor_id
        - air_temperature
        - humidity
        - status_connection