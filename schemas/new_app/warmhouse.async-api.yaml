asyncapi: '2.6.0'
info:
  title: Warm House API
  version: '1.0.0'
  description: Асинхронные события телеметрии

servers:
  production:
    url: amqp://localhost:5672
    protocol: amqp

channels:
  device.{device_id}.telemetry:
    description: Поток телеметрии от устройства
    parameters:
      device_id:
        description: Идентификатор устройства
        schema:
          type: integer
    subscribe:
      summary: Получение телеметрии устройства
      message:
        contentType: application/json
        payload:
          type: object
          properties:
            device_id:
              type: integer
            air_temperature:
              type: number
            humidity:
              type: number
            status_connection:
              type: boolean
            createdAt:
              type: string
              format: date-time
          required:
            - device_id
            - air_temperature
            - humidity
            - status_connection
            - createdAt
        examples:
          - payload:
              device_id: 1
              air_temperature: 150
              humidity: 99
              status_connection: true
              createdAt: "2025-09-21T00:00:01Z"