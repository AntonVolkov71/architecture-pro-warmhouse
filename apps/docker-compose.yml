version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: smarthome-postgres
    environment:
      POSTGRES_DB: smarthome
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./smart_home/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - smarthome-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_container
    command: rabbitmq-server --loopback-users guest
    restart: always
    ports:
      - "15672:15672"
      - "5672:5672"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smarthome-network

  temperature-api:
    build:
      context: ./temperature-api
      dockerfile: Dockerfile
    container_name: temperature-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - URI_EVENT_BUS=${URI_EVENT_BUS}
      - PORT=8081
    ports:
      - "8081:8081"
    restart: unless-stopped
    networks:
      - smarthome-network

  connect_to_devices_socket:
    build:
      context: ./connect_to_devices/socket
      dockerfile: Dockerfile
    container_name: connect_to_devices_socket
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - URI_EVENT_BUS=${URI_EVENT_BUS}
      - MOCKED_CONNECTION_IP=sensors_socket_tcp
      - MOCKED_CONNECTION_PORT=8080
    ports:
      - "8082:8080"
    restart: unless-stopped
    networks:
      - smarthome-network

  sensors_socket_tcp:
    build:
      context: ./mock_sensors/sensor_socket_tcp
      dockerfile: Dockerfile
    container_name: sensor_socket_tcp
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8083:8080"
    restart: unless-stopped
    networks:
      - smarthome-network

  telemetry:
    build:
      context: ./telemetry
      dockerfile: Dockerfile
    container_name: telemetry
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - URI_EVENT_BUS=${URI_EVENT_BUS}
    ports:
      - "8084:8080"
    restart: unless-stopped
    networks:
      - smarthome-network

  app:
    build:
      context: ./smart_home
      dockerfile: Dockerfile
    container_name: smarthome-app
    depends_on:
      postgres:
        condition: service_healthy
      temperature-api:
        condition: service_started
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - TEMPERATURE_API_URL=http://temperature-api:8081
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - smarthome-network

volumes:
  postgres_data:

networks:
  smarthome-network:
    driver: bridge